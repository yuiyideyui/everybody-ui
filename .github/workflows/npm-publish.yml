name: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    # 如果你在 npm Trusted Publisher 中设置了 Environment name，取消注释并填写相同名称。
    # environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --cache-dir='.turbo'

      - name: Debug Info
        run: |
          node -v
          npm -v
          ls -la packages/everybody-ui
          cat packages/everybody-ui/package.json
      # --- 发布到 NPM (仅在推送 Tag 时) ---
      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        # 注意：使用 Trusted Publisher 后，不再需要 env: NODE_AUTH_TOKEN
        # --provenance 会生成来源证明，增强包的可信度
        run: |
          cd ./packages/everybody-ui
          npm publish --access public --provenance

      # --- 部署文档到 GitHub Pages (仅在 main 分支) ---
      - name: Deploy Docs to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 确保这里的路径与你 VitePress 打包后的输出目录一致
          publish_dir: apps/docs/.vitepress/dist
