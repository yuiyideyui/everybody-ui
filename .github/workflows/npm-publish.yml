name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Turbo 计算变更需要完整的 git 历史

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 确保和你本地 pnpm 版本一致

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # 目前建议用 20 或 22 LTS，24 太新可能不稳定
          registry-url: "https://registry.npmjs.org"
          cache: 'pnpm'

      # --- 关键：Turbo 远程缓存 (可选，但推荐) ---
      # 如果不想配置远程服务器，本地缓存也可以加快第二次运行速度
      - name: Turborepo Cache
        uses: dtinth/setup-github-actions-cache@v2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # --- 使用 Turbo 一键构建 ---
      # 这会自动按照依赖顺序执行: everybody-ui:build -> everybody-ui-docs:build
      - name: Build All
        run: pnpm turbo build

      # --- 发布到 NPM ---
      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        # 直接运行打包好的目录发布
        run: npm publish ./packages/everybody-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 部署文档 ---
      - name: Deploy Docs to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 确保路径和你实际打出来的文档目录一致
          publish_dir: apps/docs/.vitepress/dist