name: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    # 如果你在 npm Trusted Publisher 中设置了 Environment name，取消注释并填写相同名称。
    # environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --cache-dir='.turbo'

      - name: Publish package to npm
        working-directory: packages/everybody-ui
        run: npm publish --access public --provenance
