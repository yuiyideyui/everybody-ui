name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Turbo 需要完整的 git 历史来对比变更

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: 'pnpm' # 自动缓存 pnpm 依赖

      # --- 替换原来的缓存插件为官方 actions/cache ---
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          # key 包含操作系统和 sha，确保唯一性；restore-keys 用于匹配最近的缓存
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # --- 使用 Turbo 构建 ---
      - name: Build All
        # 指定 --cache-dir 确保 Turbo 使用我们上面配置的缓存目录
        run: pnpm turbo build --cache-dir=".turbo"

      # --- 发布到 NPM ---
      - name: Publish to NPM
        # 只有在推送 v 开头的 tag 时才执行
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish ./packages/everybody-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 部署文档 ---
      - name: Deploy Docs to GitHub Pages
        # 只有在 main 分支推送时才更新文档
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 确保这个路径指向你 VitePress 打包后的真实位置
          publish_dir: apps/docs/.vitepress/dist