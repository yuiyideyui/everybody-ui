name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Turbo 计算变更需要完整的 git 历史

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: 'pnpm' # 自动缓存 pnpm 依赖库

      # --- 修正后的 Turbo 缓存逻辑：使用官方 actions/cache ---
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # --- 使用 Turbo 构建并指定缓存目录 ---
      - name: Build All
        # 显式指定 --cache-dir=".turbo"，与上面的 cache path 对应
        run: pnpm turbo build --cache-dir=".turbo"

      # --- 发布到 NPM ---
      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish ./packages/everybody-ui --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 部署文档 ---
      - name: Deploy Docs to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/.vitepress/dist
